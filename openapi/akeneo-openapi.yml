openapi: 3.1.0
info:
  title: Akeneo PIM REST API
  version: "1.0.0"
  description: |
    REST API for the Akeneo Product Information Management (PIM) platform.
    Manage products, product models, families, attributes, categories,
    channels, locales, assets, reference entities, catalogs, workflows,
    and more. Authentication uses OAuth 2.0 client credentials with
    per-tenant base URLs in the SaaS edition.
  contact:
    name: Akeneo
    url: https://api.akeneo.com
  license:
    name: Documentation Terms
    url: https://api.akeneo.com
servers:
  - url: https://{tenant}.cloud.akeneo.com
    description: Akeneo PIM SaaS tenant
    variables:
      tenant:
        default: demo
        description: Tenant subdomain assigned by Akeneo.
tags:
  - name: Authentication
  - name: Products
  - name: Product Models
  - name: Families
  - name: Attributes
  - name: Categories
  - name: Channels
  - name: Locales
  - name: Currencies
  - name: Media Files
  - name: Reference Entities
  - name: Asset Manager
  - name: Catalogs
  - name: Workflows
  - name: System
paths:
  /api/oauth/v1/token:
    post:
      tags: [Authentication]
      summary: Request OAuth 2.0 access token
      operationId: requestToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum: [password, refresh_token]
                username:
                  type: string
                password:
                  type: string
                refresh_token:
                  type: string
              required: [grant_type]
      responses:
        "200":
          description: Access token.
  /api/rest/v1:
    get:
      tags: [System]
      summary: API entry point
      operationId: apiEntry
      responses:
        "200":
          description: OK
  /api/rest/v1/system-information:
    get:
      tags: [System]
      summary: System information
      operationId: getSystemInformation
      responses:
        "200":
          description: OK
  /api/rest/v1/products:
    get:
      tags: [Products]
      summary: List products
      operationId: listProducts
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: page
          schema: { type: integer }
      responses:
        "200": { description: List of products. }
    post:
      tags: [Products]
      summary: Create a product
      operationId: createProduct
      responses:
        "201": { description: Created. }
    patch:
      tags: [Products]
      summary: Update or create several products
      operationId: bulkUpsertProducts
      responses:
        "200": { description: OK }
  /api/rest/v1/products/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Products]
      summary: Get a product
      operationId: getProduct
      responses:
        "200": { description: OK }
    patch:
      tags: [Products]
      summary: Update or create a product
      operationId: upsertProduct
      responses:
        "200": { description: OK }
    delete:
      tags: [Products]
      summary: Delete a product
      operationId: deleteProduct
      responses:
        "204": { description: No content }
  /api/rest/v1/products-uuid:
    get:
      tags: [Products]
      summary: List products by UUID
      operationId: listProductsByUuid
      responses:
        "200": { description: OK }
    post:
      tags: [Products]
      summary: Create a product by UUID
      operationId: createProductByUuid
      responses:
        "201": { description: Created }
    patch:
      tags: [Products]
      summary: Bulk upsert products by UUID
      operationId: bulkUpsertProductsByUuid
      responses:
        "200": { description: OK }
  /api/rest/v1/products-uuid/{uuid}:
    parameters:
      - in: path
        name: uuid
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Products]
      operationId: getProductByUuid
      summary: Get a product by UUID
      responses:
        "200": { description: OK }
    patch:
      tags: [Products]
      operationId: upsertProductByUuid
      summary: Update or create a product by UUID
      responses:
        "200": { description: OK }
    delete:
      tags: [Products]
      operationId: deleteProductByUuid
      summary: Delete a product by UUID
      responses:
        "204": { description: No content }
  /api/rest/v1/product-models:
    get:
      tags: [Product Models]
      operationId: listProductModels
      summary: List product models
      responses:
        "200": { description: OK }
    post:
      tags: [Product Models]
      operationId: createProductModel
      summary: Create a product model
      responses:
        "201": { description: Created }
    patch:
      tags: [Product Models]
      operationId: bulkUpsertProductModels
      summary: Bulk upsert product models
      responses:
        "200": { description: OK }
  /api/rest/v1/product-models/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Product Models]
      operationId: getProductModel
      summary: Get a product model
      responses:
        "200": { description: OK }
    patch:
      tags: [Product Models]
      operationId: upsertProductModel
      summary: Update or create a product model
      responses:
        "200": { description: OK }
    delete:
      tags: [Product Models]
      operationId: deleteProductModel
      summary: Delete a product model
      responses:
        "204": { description: No content }
  /api/rest/v1/families:
    get:
      tags: [Families]
      operationId: listFamilies
      summary: List families
      responses:
        "200": { description: OK }
    post:
      tags: [Families]
      operationId: createFamily
      summary: Create a family
      responses:
        "201": { description: Created }
  /api/rest/v1/families/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Families]
      operationId: getFamily
      summary: Get a family
      responses:
        "200": { description: OK }
    patch:
      tags: [Families]
      operationId: upsertFamily
      summary: Update or create a family
      responses:
        "200": { description: OK }
    delete:
      tags: [Families]
      operationId: deleteFamily
      summary: Delete a family
      responses:
        "204": { description: No content }
  /api/rest/v1/attributes:
    get:
      tags: [Attributes]
      operationId: listAttributes
      summary: List attributes
      responses:
        "200": { description: OK }
    post:
      tags: [Attributes]
      operationId: createAttribute
      summary: Create an attribute
      responses:
        "201": { description: Created }
  /api/rest/v1/attributes/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Attributes]
      operationId: getAttribute
      summary: Get an attribute
      responses:
        "200": { description: OK }
    patch:
      tags: [Attributes]
      operationId: upsertAttribute
      summary: Update or create an attribute
      responses:
        "200": { description: OK }
  /api/rest/v1/categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: List categories
      responses:
        "200": { description: OK }
    post:
      tags: [Categories]
      operationId: createCategory
      summary: Create a category
      responses:
        "201": { description: Created }
  /api/rest/v1/categories/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Categories]
      operationId: getCategory
      summary: Get a category
      responses:
        "200": { description: OK }
    patch:
      tags: [Categories]
      operationId: upsertCategory
      summary: Update or create a category
      responses:
        "200": { description: OK }
  /api/rest/v1/channels:
    get:
      tags: [Channels]
      operationId: listChannels
      summary: List channels
      responses:
        "200": { description: OK }
    post:
      tags: [Channels]
      operationId: createChannel
      summary: Create a channel
      responses:
        "201": { description: Created }
  /api/rest/v1/locales:
    get:
      tags: [Locales]
      operationId: listLocales
      summary: List locales
      responses:
        "200": { description: OK }
  /api/rest/v1/currencies:
    get:
      tags: [Currencies]
      operationId: listCurrencies
      summary: List currencies
      responses:
        "200": { description: OK }
  /api/rest/v1/media-files:
    get:
      tags: [Media Files]
      operationId: listMediaFiles
      summary: List media files
      responses:
        "200": { description: OK }
    post:
      tags: [Media Files]
      operationId: createMediaFile
      summary: Upload a media file
      responses:
        "201": { description: Created }
  /api/rest/v1/media-files/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Media Files]
      operationId: getMediaFile
      summary: Get a media file
      responses:
        "200": { description: OK }
  /api/rest/v1/media-files/{code}/download:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Media Files]
      operationId: downloadMediaFile
      summary: Download a media file
      responses:
        "200": { description: OK }
  /api/rest/v1/reference-entities:
    get:
      tags: [Reference Entities]
      operationId: listReferenceEntities
      summary: List reference entities
      responses:
        "200": { description: OK }
  /api/rest/v1/reference-entities/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Reference Entities]
      operationId: getReferenceEntity
      summary: Get a reference entity
      responses:
        "200": { description: OK }
    patch:
      tags: [Reference Entities]
      operationId: upsertReferenceEntity
      summary: Update or create a reference entity
      responses:
        "200": { description: OK }
  /api/rest/v1/asset-families:
    get:
      tags: [Asset Manager]
      operationId: listAssetFamilies
      summary: List asset families
      responses:
        "200": { description: OK }
  /api/rest/v1/asset-families/{code}:
    parameters:
      - in: path
        name: code
        required: true
        schema: { type: string }
    get:
      tags: [Asset Manager]
      operationId: getAssetFamily
      summary: Get an asset family
      responses:
        "200": { description: OK }
  /api/rest/v1/catalogs:
    get:
      tags: [Catalogs]
      operationId: listCatalogs
      summary: List catalogs
      responses:
        "200": { description: OK }
    post:
      tags: [Catalogs]
      operationId: createCatalog
      summary: Create a catalog
      responses:
        "201": { description: Created }
  /api/rest/v1/catalogs/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [Catalogs]
      operationId: getCatalog
      summary: Get a catalog
      responses:
        "200": { description: OK }
    patch:
      tags: [Catalogs]
      operationId: updateCatalog
      summary: Update a catalog
      responses:
        "200": { description: OK }
    delete:
      tags: [Catalogs]
      operationId: deleteCatalog
      summary: Delete a catalog
      responses:
        "204": { description: No content }
  /api/rest/v1/workflows:
    get:
      tags: [Workflows]
      operationId: listWorkflows
      summary: List workflows
      responses:
        "200": { description: OK }
  /api/rest/v1/workflows/{uuid}:
    parameters:
      - in: path
        name: uuid
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Workflows]
      operationId: getWorkflow
      summary: Get a workflow
      responses:
        "200": { description: OK }
components:
  securitySchemes:
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://{tenant}.cloud.akeneo.com/api/oauth/v1/token
          scopes: {}
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - BearerAuth: []
