aid: akeneo
name: Akeneo
description: >-
  Akeneo is a Product Information Management (PIM) platform that centralizes,
  enriches, and distributes product data across digital commerce channels,
  enabling brands, retailers, and manufacturers to deliver consistent product
  experiences. The Akeneo PIM SaaS exposes a REST API, GraphQL API, an Event
  Platform with webhooks, a Supplier Data Manager API, and an Activation API
  for retail use cases. Authentication uses OAuth 2.0 client credentials with
  per-tenant base URLs in the cloud edition.
